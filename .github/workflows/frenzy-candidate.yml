name: Frenzy Candidate

# This workflow is a build-and-evidence gate for the Frenzy fork. It never
# publishes an image, changes a Git ref, or calls a deployment control plane.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Candidate application version (for example 0.1.163-frenzy.1)"
        required: true
        type: string
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    tags:
      - "frenzy/candidate/**"

permissions:
  contents: read

env:
  GO_VERSION: "1.26.5"
  NODE_VERSION: "20"
  PNPM_VERSION: "9.15.9"
  GOVULNCHECK_VERSION: "v1.1.4"
  CANDIDATE_SOURCE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
  DISPATCH_VERSION: ${{ inputs.version || '' }}

jobs:
  # GitHub does not provide a pull_request head-branch filter. Keep the event
  # broad enough to receive PR updates, then fail closed at the job boundary.
  gate:
    if: >-
      ${{
        github.event_name == 'workflow_dispatch' ||
        startsWith(github.ref, 'refs/tags/frenzy/candidate/') ||
        (github.event_name == 'pull_request' &&
          (startsWith(github.event.pull_request.head.ref, 'integration/') ||
           startsWith(github.event.pull_request.head.ref, 'release/')))
      }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      commit: ${{ steps.metadata.outputs.commit }}
      utc_date: ${{ steps.metadata.outputs.utc_date }}
      candidate_ref: ${{ steps.metadata.outputs.candidate_ref }}
    steps:
      - name: Checkout immutable candidate source
        uses: actions/checkout@v6
        with:
          ref: ${{ env.CANDIDATE_SOURCE_SHA }}
          fetch-depth: 0
          persist-credentials: false

      - name: Validate source identity and write metadata
        id: metadata
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
          HEAD_REF: ${{ github.head_ref || '' }}
          SOURCE_SHA: ${{ env.CANDIDATE_SOURCE_SHA }}
          MANUAL_VERSION: ${{ env.DISPATCH_VERSION }}
        run: |
          set -euo pipefail

          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]] || {
            echo "candidate source is not a full commit SHA" >&2
            exit 1
          }
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          git rev-parse --verify "${SOURCE_SHA}^{commit}" >/dev/null

          version=""
          candidate_ref="$REF_NAME"
          case "$EVENT_NAME" in
            workflow_dispatch)
              version="$MANUAL_VERSION"
              candidate_ref="workflow_dispatch"
              ;;
            push)
              case "$REF_NAME" in
                frenzy/candidate/*)
                  version="${REF_NAME#frenzy/candidate/}"
                  version="${version#v}"
                  ;;
                *)
                  echo "unexpected push ref: $REF_NAME" >&2
                  exit 1
                  ;;
              esac
              ;;
            pull_request)
              case "$HEAD_REF" in
                integration/*|release/*)
                  version="${HEAD_REF#*/}"
                  version="${version#v}"
                  ;;
                *)
                  echo "candidate PR head is not integration/* or release/*" >&2
                  exit 1
                  ;;
              esac
              ;;
            *)
              echo "unsupported event: $EVENT_NAME" >&2
              exit 1
              ;;
          esac

          [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "invalid candidate version: $version" >&2
            exit 1
          }

          commit_epoch=$(git show -s --format=%ct "$SOURCE_SHA")
          utc_date=$(date -u -d "@$commit_epoch" '+%Y-%m-%dT%H:%M:%SZ')
          mkdir -p evidence
          jq -n \
            --arg version "$version" \
            --arg commit "$SOURCE_SHA" \
            --arg utc_date "$utc_date" \
            --arg event "$EVENT_NAME" \
            --arg candidate_ref "$candidate_ref" \
            '{schema_version: 1, kind: "frenzy-candidate", production: false,
              version: $version, full_commit: $commit, utc_date: $utc_date,
              trigger: {event: $event, ref: $candidate_ref},
              publication: {image_push: false, source_push: false, deployment: false}}' \
            > evidence/candidate-metadata.json

          {
            echo "version=$version"
            echo "commit=$SOURCE_SHA"
            echo "utc_date=$utc_date"
            echo "candidate_ref=$candidate_ref"
          } >> "$GITHUB_OUTPUT"

      - name: Upload non-production candidate metadata
        uses: actions/upload-artifact@v4
        with:
          name: frenzy-candidate-metadata-${{ steps.metadata.outputs.commit }}
          path: evidence/candidate-metadata.json
          if-no-files-found: error
          retention-days: 14

  backend:
    needs: gate
    if: ${{ needs.gate.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    env:
      VERSION: ${{ needs.gate.outputs.version }}
      COMMIT: ${{ needs.gate.outputs.commit }}
      DATE: ${{ needs.gate.outputs.utc_date }}
    steps:
      - name: Checkout candidate SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify toolchain and source identity
        run: |
          set -euo pipefail
          test "$(go env GOVERSION)" = "go${GO_VERSION}"
          test "$(git rev-parse HEAD)" = "$COMMIT"
          mkdir -p /tmp/frenzy-evidence/backend

      - name: Backend unit tests
        working-directory: backend
        run: |
          set -o pipefail
          go test -tags=unit -count=1 -json ./... | tee /tmp/frenzy-evidence/backend/unit.json

      - name: Backend integration harness
        working-directory: backend
        env:
          CI: "true"
        run: |
          set -o pipefail
          go test -tags=integration -count=1 -json ./... | tee /tmp/frenzy-evidence/backend/integration.json

      - name: Ent and Wire generation clean check
        working-directory: backend
        run: |
          set -euo pipefail
          go generate ./ent
          go generate ./cmd/server
          if ! git diff --quiet || [ -n "$(git status --porcelain --untracked-files=all)" ]; then
            echo "Ent/Wire generation changed the candidate tree" >&2
            git status --short
            git diff --stat
            exit 1
          fi
          printf 'ent_and_wire_generation=clean\nversion=%s\ncommit=%s\nutc_date=%s\n' \
            "$VERSION" "$COMMIT" "$DATE" > /tmp/frenzy-evidence/backend/generation.txt

      - name: Upload backend evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frenzy-candidate-backend-${{ needs.gate.outputs.commit }}
          path: /tmp/frenzy-evidence/backend
          if-no-files-found: ignore
          retention-days: 14

  lint:
    needs: gate
    if: ${{ needs.gate.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    steps:
      - name: Checkout candidate SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Verify Go toolchain
        run: test "$(go env GOVERSION)" = "go${GO_VERSION}"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9
          args: --timeout=30m
          working-directory: backend

  frontend:
    needs: gate
    if: ${{ needs.gate.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      VERSION: ${{ needs.gate.outputs.version }}
      COMMIT: ${{ needs.gate.outputs.commit }}
      DATE: ${{ needs.gate.outputs.utc_date }}
    steps:
      - name: Checkout candidate SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Frontend lint
        working-directory: frontend
        run: pnpm run lint:check

      - name: Frontend typecheck
        working-directory: frontend
        run: pnpm run typecheck

      - name: Frontend Vitest
        working-directory: frontend
        run: pnpm run test:run

      - name: Frontend build
        working-directory: frontend
        run: pnpm run build

      - name: Write frontend evidence metadata
        run: |
          set -euo pipefail
          mkdir -p evidence/frontend
          test -d backend/internal/web/dist
          jq -n \
            --arg version "$VERSION" \
            --arg commit "$COMMIT" \
            --arg utc_date "$DATE" \
            '{production: false, version: $version, full_commit: $commit,
              utc_date: $utc_date, checks: ["lint", "typecheck", "vitest", "build"]}' \
            > evidence/frontend/frontend-checks.json

      - name: Upload frontend evidence and non-production build artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frenzy-candidate-frontend-${{ needs.gate.outputs.commit }}
          path: |
            evidence/frontend
            backend/internal/web/dist
          if-no-files-found: ignore
          retention-days: 14

  security:
    needs: gate
    if: ${{ needs.gate.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 35
    env:
      VERSION: ${{ needs.gate.outputs.version }}
      COMMIT: ${{ needs.gate.outputs.commit }}
      DATE: ${{ needs.gate.outputs.utc_date }}
    steps:
      - name: Checkout candidate SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: backend/go.mod
          check-latest: false
          cache: true
          cache-dependency-path: backend/go.sum

      - name: Install pinned govulncheck
        working-directory: backend
        run: go install "golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}"

      - name: Run govulncheck
        working-directory: backend
        run: |
          set -o pipefail
          mkdir -p ../evidence/security
          "$(go env GOPATH)/bin/govulncheck" ./... | tee ../evidence/security/govulncheck.txt

      - name: Set up pnpm
        uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run pnpm audit and existing exception gate
        working-directory: frontend
        run: |
          set -euo pipefail
          mkdir -p ../evidence/security
          set +e
          pnpm audit --prod --audit-level=high --json > ../evidence/security/pnpm-audit.json
          audit_status=$?
          set -e
          jq -e 'type == "object"' ../evidence/security/pnpm-audit.json >/dev/null || {
            echo "pnpm audit did not return JSON (exit $audit_status)" >&2
            exit 1
          }
          python ../tools/check_pnpm_audit_exceptions.py \
            --audit ../evidence/security/pnpm-audit.json \
            --exceptions ../.github/audit-exceptions.yml
          printf 'pnpm_audit_exit=%s\n' "$audit_status" > ../evidence/security/pnpm-audit-status.txt

      - name: Write security evidence metadata
        run: |
          jq -n \
            --arg version "$VERSION" \
            --arg commit "$COMMIT" \
            --arg utc_date "$DATE" \
            --arg govulncheck "$GOVULNCHECK_VERSION" \
            '{production: false, version: $version, full_commit: $commit,
              utc_date: $utc_date, govulncheck: $govulncheck,
              pnpm_audit_exception_gate: true}' \
            > evidence/security/security-checks.json

      - name: Upload security evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frenzy-candidate-security-${{ needs.gate.outputs.commit }}
          path: evidence/security
          if-no-files-found: ignore
          retention-days: 14

  image:
    needs: gate
    if: ${{ needs.gate.result == 'success' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    env:
      VERSION: ${{ needs.gate.outputs.version }}
      COMMIT: ${{ needs.gate.outputs.commit }}
      DATE: ${{ needs.gate.outputs.utc_date }}
    steps:
      - name: Checkout candidate SHA
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.gate.outputs.commit }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build linux/amd64 OCI candidate with attestations
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: false
          tags: local/sub2api:frenzy-candidate-${{ needs.gate.outputs.commit }}
          labels: |
            org.opencontainers.image.version=${{ needs.gate.outputs.version }}
            org.opencontainers.image.revision=${{ needs.gate.outputs.commit }}
            org.opencontainers.image.created=${{ needs.gate.outputs.utc_date }}
          build-args: |
            VERSION=${{ needs.gate.outputs.version }}
            COMMIT=${{ needs.gate.outputs.commit }}
            DATE=${{ needs.gate.outputs.utc_date }}
          outputs: type=oci,dest=/tmp/sub2api-frenzy-candidate.oci.tar
          provenance: mode=max
          sbom: true

      - name: Verify OCI platform and write digest/signature report
        env:
          BUILDX_REPORTED_DIGEST: ${{ steps.build.outputs.digest || '' }}
        run: |
          set -euo pipefail
          mkdir -p evidence/image
          tar -xOf /tmp/sub2api-frenzy-candidate.oci.tar index.json > evidence/image/oci-index.json
          jq -e '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64")] | length == 1' \
            evidence/image/oci-index.json >/dev/null
          artifact_sha256=$(sha256sum /tmp/sub2api-frenzy-candidate.oci.tar | awk '{print $1}')
          local_manifest_digest=$(jq -r '[.manifests[] | select(.platform.os == "linux" and .platform.architecture == "amd64")][0].digest // empty' evidence/image/oci-index.json)
          buildx_digest="$BUILDX_REPORTED_DIGEST"
          jq -n \
            --arg digest "$buildx_digest" \
            '{source: "docker/build-push-action", reported_digest: (if $digest == "" then null else $digest end),
              note: "A build-only OCI output has no registry metadata unless the action exposes a digest."}' \
            > evidence/image/build-metadata.json
          jq -n \
            --arg version "$VERSION" \
            --arg commit "$COMMIT" \
            --arg utc_date "$DATE" \
            --arg artifact_sha256 "$artifact_sha256" \
            --arg local_manifest_digest "$local_manifest_digest" \
            --arg buildx_digest "$buildx_digest" \
            '{production: false, platform: "linux/amd64", version: $version,
              full_commit: $commit, utc_date: $utc_date,
              artifact_sha256: $artifact_sha256,
              local_oci_manifest_digest: (if $local_manifest_digest == "" then null else $local_manifest_digest end),
              buildx_reported_digest: (if $buildx_digest == "" then null else $buildx_digest end),
              registry_image_digest: {status: "missing", reason: "build-only workflow does not push to a registry"},
              signature: {status: "missing", reason: "no signing identity is available in read-only PR CI"},
              provenance: {requested: true, mode: "max", local_artifact_only: true},
              sbom: {requested: true, local_artifact_only: true}}' \
            > evidence/image/attestation-report.json
          cat > evidence/image/attestation-report.txt <<EOF
          production=false
          version=$VERSION
          full_commit=$COMMIT
          utc_date=$DATE
          platform=linux/amd64
          artifact_sha256=$artifact_sha256
          local_oci_manifest_digest=${local_manifest_digest:-unavailable}
          registry_image_digest=missing (no push by design)
          signature=missing (no signing identity in read-only CI)
          provenance=requested buildx mode=max; local artifact only
          sbom=requested buildx; local artifact only
          EOF

      - name: Upload non-production OCI and evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frenzy-candidate-oci-${{ needs.gate.outputs.commit }}
          path: |
            /tmp/sub2api-frenzy-candidate.oci.tar
            evidence/image
          if-no-files-found: ignore
          retention-days: 7

  summary:
    needs: [gate, backend, lint, frontend, security, image]
    if: ${{ always() && needs.gate.result == 'success' }}
    runs-on: ubuntu-24.04
    steps:
      - name: Require every candidate gate
        env:
          BACKEND: ${{ needs.backend.result }}
          LINT: ${{ needs.lint.result }}
          FRONTEND: ${{ needs.frontend.result }}
          SECURITY: ${{ needs.security.result }}
          IMAGE: ${{ needs.image.result }}
        run: |
          set -euo pipefail
          printf 'backend=%s\nlint=%s\nfrontend=%s\nsecurity=%s\nimage=%s\n' \
            "$BACKEND" "$LINT" "$FRONTEND" "$SECURITY" "$IMAGE"
          for result in "$BACKEND" "$LINT" "$FRONTEND" "$SECURITY" "$IMAGE"; do
            test "$result" = success
          done
